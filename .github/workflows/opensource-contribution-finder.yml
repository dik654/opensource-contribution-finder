# 🌍 기여 가능한 이슈 Discord Notifier
# 
# .github/workflows/contribution-issues.yml

name: Contribution-Friendly Issues

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Search and notify new issues
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          script: |
            const https = require('https');
            const fs = require('fs');
            const DISCORD_WEBHOOK = process.env.DISCORD_WEBHOOK;
            
            // ═══════════════════════════════════════════════════════
            // 🎯 설정
            // ═══════════════════════════════════════════════════════
            
            const CONFIG = {
              // 검색 쿼리들 (직접 지정)
              searches: [
                // Rust 프로젝트
                { label: 'good first issue', extra: 'repo:rust-lang/rust', name: 'rust-lang/rust' },
                { label: 'good first issue', extra: 'repo:paradigmxyz/reth', name: 'paradigmxyz/reth' },
                { label: 'good first issue', extra: 'repo:foundry-rs/foundry', name: 'foundry' },
                { label: 'E-easy', extra: 'repo:rust-lang/rust', name: 'rust-lang/rust (E-easy)' },
                
                // Go 프로젝트  
                { label: 'good first issue', extra: 'repo:ethereum/go-ethereum', name: 'go-ethereum' },
                { label: 'help wanted', extra: 'repo:ethereum/go-ethereum', name: 'go-ethereum' },
                
                // TypeScript 프로젝트
                { label: 'good first issue', extra: 'repo:ChainSafe/lodestar', name: 'lodestar' },
                { label: 'help wanted', extra: 'repo:ChainSafe/lodestar', name: 'lodestar' },
                
                // 큰 프로젝트들 (라벨 기반)
                { label: 'good first issue', extra: 'stars:>1000', name: 'popular (1000+)' },
                { label: 'help wanted', extra: 'stars:>1000', name: 'popular (1000+)' },
              ],
              
              maxResults: 100,
              dbFile: 'notified-issues.md',
              maxStoredIssues: 1000,
            };
            
            // ═══════════════════════════════════════════════════════
            // 📁 DB 함수
            // ═══════════════════════════════════════════════════════
            
            function loadNotifiedIssues() {
              try {
                if (fs.existsSync(CONFIG.dbFile)) {
                  const content = fs.readFileSync(CONFIG.dbFile, 'utf8');
                  const ids = content.match(/<!-- id:(\d+) -->/g) || [];
                  return new Set(ids.map(s => s.match(/\d+/)[0]));
                }
              } catch (e) {}
              return new Set();
            }
            
            function saveNotifiedIssues(issues) {
              const now = new Date().toISOString().split('T')[0];
              
              let content = '';
              if (fs.existsSync(CONFIG.dbFile)) {
                content = fs.readFileSync(CONFIG.dbFile, 'utf8');
              } else {
                content = `# Notified Issues\n\n> 자동 생성 파일\n`;
              }
              
              if (issues.length > 0) {
                let newSection = `\n## ${now}\n\n`;
                for (const issue of issues) {
                  newSection += `- <!-- id:${issue.id} --> [${issue.repo}#${issue.number}](${issue.url}) - ${issue.title}\n`;
                }
                
                const headerEnd = content.indexOf('\n## ');
                if (headerEnd > -1) {
                  content = content.slice(0, headerEnd) + newSection + content.slice(headerEnd);
                } else {
                  content += newSection;
                }
              }
              
              const idCount = (content.match(/<!-- id:/g) || []).length;
              if (idCount > CONFIG.maxStoredIssues) {
                const sections = content.split('\n## ');
                content = sections.slice(0, -1).join('\n## ');
              }
              
              fs.writeFileSync(CONFIG.dbFile, content);
            }
            
            // ═══════════════════════════════════════════════════════
            // 🔍 검색
            // ═══════════════════════════════════════════════════════
            
            async function search(searchConfig) {
              const query = `is:issue is:open label:"${searchConfig.label}" ${searchConfig.extra}`;
              
              console.log(`🔍 [${searchConfig.name}] "${searchConfig.label}"`);
              console.log(`   Query: ${query}`);
              
              try {
                const response = await github.rest.search.issuesAndPullRequests({
                  q: query,
                  sort: 'updated',
                  order: 'desc',
                  per_page: CONFIG.maxResults
                });
                
                console.log(`   → ${response.data.total_count} total, fetched ${response.data.items.length}`);
                
                return response.data.items.map(issue => {
                  const repoMatch = issue.repository_url.match(/repos\/(.+)$/);
                  return {
                    id: String(issue.id),
                    number: issue.number,
                    title: issue.title.slice(0, 55),
                    url: issue.html_url,
                    repo: repoMatch ? repoMatch[1] : 'unknown',
                  };
                });
                
              } catch (e) {
                console.log(`   ❌ ${e.message}`);
                return [];
              }
            }
            
            // ═══════════════════════════════════════════════════════
            // 🚀 실행
            // ═══════════════════════════════════════════════════════
            
            console.log('📂 Loading DB...');
            const notifiedIds = loadNotifiedIssues();
            console.log(`   Already notified: ${notifiedIds.size}\n`);
            
            const allIssues = [];
            
            for (const searchConfig of CONFIG.searches) {
              const issues = await search(searchConfig);
              allIssues.push(...issues);
              
              // 4초 대기
              await new Promise(r => setTimeout(r, 4000));
            }
            
            // 중복 제거 & 새 이슈만
            const unique = [...new Map(allIssues.map(i => [i.id, i])).values()];
            const newIssues = unique.filter(i => !notifiedIds.has(i.id));
            
            console.log(`\n📊 Total unique: ${unique.length}, New: ${newIssues.length}`);
            
            if (newIssues.length === 0) {
              console.log('✅ No new issues');
              return;
            }
            
            // Discord Embeds - 레포별 그룹화
            const byRepo = {};
            for (const i of newIssues) {
              if (!byRepo[i.repo]) byRepo[i.repo] = [];
              byRepo[i.repo].push(i);
            }
            
            const embeds = [];
            
            for (const [repo, issues] of Object.entries(byRepo).slice(0, 10)) {
              embeds.push({
                title: `📦 ${repo}`,
                color: 0x238636,
                description: issues.slice(0, 5).map(i => 
                  `[#${i.number}](${i.url}) ${i.title}`
                ).join('\n'),
                footer: { text: `${issues.length} issue(s)` }
              });
            }
            
            // Discord 전송
            if (!DISCORD_WEBHOOK) {
              console.log('❌ DISCORD_WEBHOOK not set');
              return;
            }
            
            const payload = JSON.stringify({
              username: '🆕 Issue Finder',
              content: `## 🎯 새 이슈 ${newIssues.length}개 발견!`,
              embeds: embeds.slice(0, 10)
            });
            
            await new Promise((resolve, reject) => {
              const url = new URL(DISCORD_WEBHOOK);
              const req = https.request({
                hostname: url.hostname,
                path: url.pathname,
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
              }, res => {
                console.log(res.statusCode === 204 ? '✅ Discord sent!' : `Discord: ${res.statusCode}`);
                resolve();
              });
              req.on('error', reject);
              req.write(payload);
              req.end();
            });
            
            // DB 저장
            saveNotifiedIssues(newIssues);
            console.log('💾 DB saved');
            
      - name: Commit DB
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add notified-issues.md 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update notified issues [skip ci]"
          git push || true
