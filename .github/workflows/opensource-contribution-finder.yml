# 🌍 기여 가능한 이슈 Discord Notifier
# 
# .github/workflows/contribution-issues.yml

name: Contribution-Friendly Issues

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Search and notify new issues
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          script: |
            const https = require('https');
            const fs = require('fs');
            const DISCORD_WEBHOOK = process.env.DISCORD_WEBHOOK;
            
            // ═══════════════════════════════════════════════════════
            // 🎯 설정
            // ═══════════════════════════════════════════════════════
            
            const CONFIG = {
              languages: ['rust', 'go', 'typescript'],
              labels: ['good first issue', 'help wanted'],
              minStars: 50,
              maxResults: 100,  // 30 → 100 (최대치)
              dbFile: 'notified-issues.md',
              maxStoredIssues: 500,
            };
            
            // ═══════════════════════════════════════════════════════
            // 📁 DB 함수
            // ═══════════════════════════════════════════════════════
            
            function loadNotifiedIssues() {
              try {
                if (fs.existsSync(CONFIG.dbFile)) {
                  const content = fs.readFileSync(CONFIG.dbFile, 'utf8');
                  const ids = content.match(/<!-- id:(\d+) -->/g) || [];
                  return new Set(ids.map(s => s.match(/\d+/)[0]));
                }
              } catch (e) {}
              return new Set();
            }
            
            function saveNotifiedIssues(issues) {
              const now = new Date().toISOString().split('T')[0];
              
              let content = '';
              if (fs.existsSync(CONFIG.dbFile)) {
                content = fs.readFileSync(CONFIG.dbFile, 'utf8');
              } else {
                content = `# Notified Issues\n\n> 자동 생성 파일\n`;
              }
              
              if (issues.length > 0) {
                let newSection = `\n## ${now}\n\n`;
                for (const issue of issues) {
                  newSection += `- <!-- id:${issue.id} --> [${issue.repo}#${issue.number}](${issue.url}) - ${issue.title}\n`;
                }
                
                const headerEnd = content.indexOf('\n## ');
                if (headerEnd > -1) {
                  content = content.slice(0, headerEnd) + newSection + content.slice(headerEnd);
                } else {
                  content += newSection;
                }
              }
              
              const idCount = (content.match(/<!-- id:/g) || []).length;
              if (idCount > CONFIG.maxStoredIssues) {
                const sections = content.split('\n## ');
                content = sections.slice(0, -1).join('\n## ');
              }
              
              fs.writeFileSync(CONFIG.dbFile, content);
            }
            
            // ═══════════════════════════════════════════════════════
            // 🔍 검색
            // ═══════════════════════════════════════════════════════
            
            async function search(language, label) {
              const query = `is:issue is:open language:${language} label:"${label}" stars:>=${CONFIG.minStars}`;
              
              console.log(`🔍 [${language}] "${label}"`);
              
              try {
                const response = await github.rest.search.issuesAndPullRequests({
                  q: query,
                  sort: 'updated',
                  order: 'desc',
                  per_page: CONFIG.maxResults
                });
                
                console.log(`   → ${response.data.total_count} total, fetched ${response.data.items.length}`);
                
                return response.data.items.map(issue => {
                  const repoMatch = issue.repository_url.match(/repos\/(.+)$/);
                  return {
                    id: String(issue.id),
                    number: issue.number,
                    title: issue.title.slice(0, 55),
                    url: issue.html_url,
                    repo: repoMatch ? repoMatch[1] : 'unknown',
                    language,
                  };
                });
                
              } catch (e) {
                console.log(`   ❌ ${e.message}`);
                return [];
              }
            }
            
            // ═══════════════════════════════════════════════════════
            // 🚀 실행
            // ═══════════════════════════════════════════════════════
            
            console.log('📂 Loading DB...');
            const notifiedIds = loadNotifiedIssues();
            console.log(`   Already notified: ${notifiedIds.size}\n`);
            
            const allIssues = [];
            
            for (const lang of CONFIG.languages) {
              for (const label of CONFIG.labels) {
                const issues = await search(lang, label);
                allIssues.push(...issues);
                
                // 6초 대기
                await new Promise(r => setTimeout(r, 6000));
              }
            }
            
            // 중복 제거 & 새 이슈만
            const unique = [...new Map(allIssues.map(i => [i.id, i])).values()];
            const newIssues = unique.filter(i => !notifiedIds.has(i.id));
            
            console.log(`\n📊 Total: ${unique.length}, New: ${newIssues.length}`);
            
            if (newIssues.length === 0) {
              console.log('✅ No new issues');
              return;
            }
            
            // Discord Embeds
            const byLang = {};
            for (const i of newIssues) {
              if (!byLang[i.language]) byLang[i.language] = [];
              byLang[i.language].push(i);
            }
            
            const colors = { rust: 0xDEA584, go: 0x00ADD8, typescript: 0x3178C6 };
            const embeds = [];
            
            for (const [lang, issues] of Object.entries(byLang)) {
              const byRepo = {};
              for (const i of issues) {
                if (!byRepo[i.repo]) byRepo[i.repo] = [];
                byRepo[i.repo].push(i);
              }
              
              const fields = Object.entries(byRepo).slice(0, 4).map(([repo, list]) => ({
                name: `📦 ${repo.split('/')[1]}`,
                value: list.slice(0, 2).map(i => `[#${i.number}](${i.url}) ${i.title}`).join('\n'),
                inline: false
              }));
              
              embeds.push({
                title: `${lang.toUpperCase()} — ${issues.length} new`,
                color: colors[lang] || 0x6e7681,
                fields
              });
            }
            
            // Discord 전송
            if (!DISCORD_WEBHOOK) {
              console.log('❌ DISCORD_WEBHOOK not set');
              return;
            }
            
            const payload = JSON.stringify({
              username: '🆕 Issue Finder',
              content: `## 🎯 새 이슈 ${newIssues.length}개!\n> ${CONFIG.languages.join(', ')} | ⭐${CONFIG.minStars}+`,
              embeds: embeds.slice(0, 10)
            });
            
            await new Promise((resolve, reject) => {
              const url = new URL(DISCORD_WEBHOOK);
              const req = https.request({
                hostname: url.hostname,
                path: url.pathname,
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
              }, res => {
                console.log(res.statusCode === 204 ? '✅ Discord sent!' : `Discord: ${res.statusCode}`);
                resolve();
              });
              req.on('error', reject);
              req.write(payload);
              req.end();
            });
            
            // DB 저장
            saveNotifiedIssues(newIssues);
            console.log('💾 DB saved');
            
      - name: Commit DB
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add notified-issues.md 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update notified issues [skip ci]"
          git push || true
