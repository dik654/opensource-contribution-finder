# 🌍 기여 가능한 이슈 Discord Notifier
# 
# Cosmos SDK EVM, Reth 기반, Commonware 기반 프로젝트들
#
# .github/workflows/contribution-issues.yml

name: Contribution-Friendly Issues

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Search and notify new issues
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          script: |
            const https = require('https');
            const fs = require('fs');
            const DISCORD_WEBHOOK = process.env.DISCORD_WEBHOOK;
            
            // ═══════════════════════════════════════════════════════
            // 🎯 프로젝트 목록
            // ═══════════════════════════════════════════════════════
            
            const PROJECTS = {
              // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
              // 🔷 Cosmos SDK EVM 프로젝트들
              // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
              'cosmos-evm': [
                'cosmos/evm',           // Cosmos 공식 EVM
                'evmos/evmos',          // Evmos
                'sei-protocol/sei-chain', // Sei
                'InjectiveLabs/injective-core', // Injective
                'Canto-Network/Canto',  // Canto
                'crypto-org-chain/cronos', // Cronos
                'initia-labs/minievm',  // MiniEVM (Initia)
                'initia-labs/initia',   // Initia
                'berachain/beacon-kit', // Berachain
                'berachain/polaris',    // Berachain Polaris EVM
              ],
              
              // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
              // 🦀 Reth 기반 프로젝트들
              // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
              'reth-based': [
                'paradigmxyz/reth',     // Reth 본체
                'ethereum-optimism/op-reth', // OP Reth
                'bnb-chain/reth',       // BNB Chain Reth
                'Galxe/gravity-reth',   // Gravity Reth
                'worldcoin/world-chain', // World Chain
              ],
              
              // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
              // ⚡ Commonware 기반
              // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
              'commonware': [
                'commonwarexyz/monorepo', // Commonware Library
                'commonwarexyz/alto',     // Alto blockchain
              ],
              
              // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
              // 🔧 관련 도구들
              // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
              'tools': [
                'foundry-rs/foundry',   // Foundry
                'alloy-rs/alloy',       // Alloy
                'bluealloy/revm',       // Revm
                'paradigmxyz/alphanet', // Alphanet
              ],
            };
            
            // 검색할 라벨들
            const LABELS = [
              'good first issue',
              'help wanted',
              'E-easy',           // rust-lang 스타일
              'easy',
              'beginner',
              'contributor-friendly',
            ];
            
            const CONFIG = {
              maxResults: 100,
              dbFile: 'notified-issues.md',
              maxStoredIssues: 1000,
            };
            
            // ═══════════════════════════════════════════════════════
            // 📁 DB 함수
            // ═══════════════════════════════════════════════════════
            
            function loadNotifiedIssues() {
              try {
                if (fs.existsSync(CONFIG.dbFile)) {
                  const content = fs.readFileSync(CONFIG.dbFile, 'utf8');
                  const ids = content.match(/<!-- id:(\d+) -->/g) || [];
                  return new Set(ids.map(s => s.match(/\d+/)[0]));
                }
              } catch (e) {}
              return new Set();
            }
            
            function saveNotifiedIssues(issues) {
              const now = new Date().toISOString().split('T')[0];
              
              let content = '';
              if (fs.existsSync(CONFIG.dbFile)) {
                content = fs.readFileSync(CONFIG.dbFile, 'utf8');
              } else {
                content = `# Notified Issues\n\n> 자동 생성 파일 - Cosmos EVM, Reth, Commonware 프로젝트\n`;
              }
              
              if (issues.length > 0) {
                let newSection = `\n## ${now}\n\n`;
                for (const issue of issues) {
                  newSection += `- <!-- id:${issue.id} --> [${issue.repo}#${issue.number}](${issue.url}) - ${issue.title}\n`;
                }
                
                const headerEnd = content.indexOf('\n## ');
                if (headerEnd > -1) {
                  content = content.slice(0, headerEnd) + newSection + content.slice(headerEnd);
                } else {
                  content += newSection;
                }
              }
              
              const idCount = (content.match(/<!-- id:/g) || []).length;
              if (idCount > CONFIG.maxStoredIssues) {
                const sections = content.split('\n## ');
                content = sections.slice(0, -1).join('\n## ');
              }
              
              fs.writeFileSync(CONFIG.dbFile, content);
            }
            
            // ═══════════════════════════════════════════════════════
            // 🔍 검색
            // ═══════════════════════════════════════════════════════
            
            async function searchRepo(repo, label) {
              const query = `is:issue is:open repo:${repo} label:"${label}"`;
              
              try {
                const response = await github.rest.search.issuesAndPullRequests({
                  q: query,
                  sort: 'updated',
                  order: 'desc',
                  per_page: 50
                });
                
                if (response.data.total_count > 0) {
                  console.log(`   ✓ [${repo}] "${label}": ${response.data.total_count}`);
                }
                
                return response.data.items.map(issue => ({
                  id: String(issue.id),
                  number: issue.number,
                  title: issue.title.slice(0, 60),
                  url: issue.html_url,
                  repo: repo,
                }));
                
              } catch (e) {
                // 404 등은 무시
                return [];
              }
            }
            
            // ═══════════════════════════════════════════════════════
            // 🚀 실행
            // ═══════════════════════════════════════════════════════
            
            console.log('📂 Loading DB...');
            const notifiedIds = loadNotifiedIssues();
            console.log(`   Already notified: ${notifiedIds.size}\n`);
            
            const allIssues = [];
            
            // 카테고리별 검색
            for (const [category, repos] of Object.entries(PROJECTS)) {
              console.log(`\n🔍 Searching ${category}...`);
              
              for (const repo of repos) {
                for (const label of LABELS) {
                  const issues = await searchRepo(repo, label);
                  allIssues.push(...issues.map(i => ({ ...i, category })));
                  
                  // Rate limit 방지: 3초 대기
                  await new Promise(r => setTimeout(r, 3000));
                }
              }
            }
            
            // 중복 제거 & 새 이슈만
            const unique = [...new Map(allIssues.map(i => [i.id, i])).values()];
            const newIssues = unique.filter(i => !notifiedIds.has(i.id));
            
            console.log(`\n📊 Total unique: ${unique.length}, New: ${newIssues.length}`);
            
            if (newIssues.length === 0) {
              console.log('✅ No new issues');
              return;
            }
            
            // Discord Embeds - 카테고리별
            const categoryColors = {
              'cosmos-evm': 0x2E3148,  // Cosmos 색상
              'reth-based': 0xE25822,  // Rust 색상
              'commonware': 0x00D4AA,  // Commonware 색상
              'tools': 0xF7931A,       // 도구 색상
            };
            
            const categoryEmoji = {
              'cosmos-evm': '🔷',
              'reth-based': '🦀',
              'commonware': '⚡',
              'tools': '🔧',
            };
            
            const byCategory = {};
            for (const i of newIssues) {
              if (!byCategory[i.category]) byCategory[i.category] = [];
              byCategory[i.category].push(i);
            }
            
            const embeds = [];
            
            for (const [cat, issues] of Object.entries(byCategory)) {
              // 레포별 그룹
              const byRepo = {};
              for (const i of issues) {
                if (!byRepo[i.repo]) byRepo[i.repo] = [];
                byRepo[i.repo].push(i);
              }
              
              const fields = Object.entries(byRepo).slice(0, 5).map(([repo, list]) => ({
                name: `📦 ${repo.split('/')[1]}`,
                value: list.slice(0, 3).map(i => `[#${i.number}](${i.url}) ${i.title}`).join('\n'),
                inline: false
              }));
              
              embeds.push({
                title: `${categoryEmoji[cat] || '📁'} ${cat} — ${issues.length} issues`,
                color: categoryColors[cat] || 0x6e7681,
                fields
              });
            }
            
            // Discord 전송
            if (!DISCORD_WEBHOOK) {
              console.log('❌ DISCORD_WEBHOOK not set');
              return;
            }
            
            const payload = JSON.stringify({
              username: '🆕 Blockchain Issue Finder',
              content: `## 🎯 새 이슈 ${newIssues.length}개 발견!\n> Cosmos EVM | Reth | Commonware`,
              embeds: embeds.slice(0, 10)
            });
            
            await new Promise((resolve, reject) => {
              const url = new URL(DISCORD_WEBHOOK);
              const req = https.request({
                hostname: url.hostname,
                path: url.pathname,
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
              }, res => {
                console.log(res.statusCode === 204 ? '✅ Discord sent!' : `Discord: ${res.statusCode}`);
                resolve();
              });
              req.on('error', reject);
              req.write(payload);
              req.end();
            });
            
            // DB 저장
            saveNotifiedIssues(newIssues);
            console.log('💾 DB saved');
            
      - name: Commit DB
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add notified-issues.md 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update notified issues [skip ci]"
          git push || true
